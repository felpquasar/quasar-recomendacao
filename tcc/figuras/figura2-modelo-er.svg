<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="860" height="380" fill="#ffffff"/>

  <defs>
    <marker id="erline" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="3" fill="#455a64"/>
    </marker>
  </defs>

  <!-- ===== qb_clientes ===== -->
  <g>
    <rect x="20" y="120" width="180" height="120" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <rect x="20" y="120" width="180" height="26" rx="6" fill="#1565c0"/>
    <text x="110" y="138" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">qb_clientes</text>
    <text x="32" y="166" font-size="12" fill="#0d47a1" font-weight="bold">PK  id</text>
    <text x="32" y="186" font-size="12" fill="#333">nome_loja</text>
    <text x="32" y="206" font-size="12" fill="#333">cidade</text>
    <text x="32" y="226" font-size="12" fill="#333">estado</text>
  </g>

  <!-- ===== qb_vendas ===== -->
  <g>
    <rect x="300" y="100" width="190" height="160" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <rect x="300" y="100" width="190" height="26" rx="6" fill="#2e7d32"/>
    <text x="395" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">qb_vendas</text>
    <text x="312" y="146" font-size="12" fill="#1b5e20" font-weight="bold">PK  id</text>
    <text x="312" y="166" font-size="12" fill="#c62828" font-weight="bold">FK  cliente_id</text>
    <text x="312" y="186" font-size="12" fill="#333">data</text>
    <text x="312" y="206" font-size="12" fill="#333">valor_total</text>
    <text x="312" y="226" font-size="12" fill="#333">metodo_pagamento</text>
  </g>

  <!-- ===== qb_itens_venda ===== -->
  <g>
    <rect x="590" y="100" width="200" height="160" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <rect x="590" y="100" width="200" height="26" rx="6" fill="#f9a825"/>
    <text x="690" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">qb_itens_venda</text>
    <text x="602" y="146" font-size="12" fill="#e65100" font-weight="bold">PK  id</text>
    <text x="602" y="166" font-size="12" fill="#c62828" font-weight="bold">FK  venda_id</text>
    <text x="602" y="186" font-size="12" fill="#c62828" font-weight="bold">FK  produto_id</text>
    <text x="602" y="206" font-size="12" fill="#333">quantidade</text>
    <text x="602" y="226" font-size="12" fill="#333">valor_unitario</text>
  </g>

  <!-- ===== qb_produtos ===== -->
  <g>
    <rect x="610" y="300" width="180" height="64" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
    <rect x="610" y="300" width="180" height="26" rx="6" fill="#6a1b9a"/>
    <text x="700" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">qb_produtos</text>
    <text x="622" y="346" font-size="12" fill="#4a148c" font-weight="bold">PK  id</text>
    <text x="700" y="346" font-size="11" fill="#333">nome · categoria · preco</text>
  </g>

  <!-- Relacionamento clientes 1 para N vendas -->
  <line x1="200" y1="180" x2="300" y2="180" stroke="#455a64" stroke-width="1.5"/>
  <text x="214" y="173" font-size="13" fill="#455a64" font-weight="bold">1</text>
  <text x="280" y="173" font-size="13" fill="#455a64" font-weight="bold">N</text>

  <!-- Relacionamento vendas 1 para N itens -->
  <line x1="490" y1="180" x2="590" y2="180" stroke="#455a64" stroke-width="1.5"/>
  <text x="504" y="173" font-size="13" fill="#455a64" font-weight="bold">1</text>
  <text x="570" y="173" font-size="13" fill="#455a64" font-weight="bold">N</text>

  <!-- Relacionamento itens N para 1 produtos -->
  <line x1="690" y1="260" x2="690" y2="300" stroke="#455a64" stroke-width="1.5"/>
  <text x="698" y="278" font-size="13" fill="#455a64" font-weight="bold">N</text>
  <text x="698" y="298" font-size="13" fill="#455a64" font-weight="bold">1</text>

  <!-- Titulo / nota -->
  <text x="20" y="40" font-size="13" fill="#777">Cardinalidade: um cliente tem N vendas; uma venda tem N itens; cada item referencia 1 produto.</text>
  <text x="20" y="60" font-size="12" fill="#999">O par (venda_id, produto_id) materializa "produto presente na cesta" — insumo da Market Basket Analysis.</text>
</svg>
