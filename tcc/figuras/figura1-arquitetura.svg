<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="Arial, Helvetica, sans-serif">
  <rect width="760" height="560" fill="#ffffff"/>

  <!-- defs: arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Camada 1: Cliente -->
  <rect x="180" y="30" width="400" height="64" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="380" y="56" text-anchor="middle" font-size="16" font-weight="bold" fill="#0d47a1">Cliente (front-end)</text>
  <text x="380" y="78" text-anchor="middle" font-size="12" fill="#333">React 18 · Vite · Chart.js · busca com autocomplete</text>

  <!-- Camada 2: API REST -->
  <rect x="180" y="142" width="400" height="64" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="380" y="168" text-anchor="middle" font-size="16" font-weight="bold" fill="#1b5e20">API REST (Express)</text>
  <text x="380" y="190" text-anchor="middle" font-size="12" fill="#333">Rotas: recomendacoes · estatisticas · validacao · produtos</text>

  <!-- Camada 3: Servicos -->
  <rect x="180" y="254" width="400" height="64" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
  <text x="380" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">Serviços (lógica de negócio)</text>
  <text x="380" y="302" text-anchor="middle" font-size="12" fill="#333">recomendacao (Association Rules) · validacao · cache</text>

  <!-- Camada 4: Models -->
  <rect x="180" y="366" width="400" height="64" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="380" y="392" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a148c">Camada de dados (Models)</text>
  <text x="380" y="414" text-anchor="middle" font-size="12" fill="#333">buscarVendas / buscarProdutos — isola o acesso ao banco</text>

  <!-- Camada 5: Banco -->
  <rect x="180" y="478" width="400" height="64" rx="8" fill="#eceff1" stroke="#455a64" stroke-width="1.5"/>
  <text x="380" y="504" text-anchor="middle" font-size="16" font-weight="bold" fill="#263238">Banco de dados</text>
  <text x="380" y="526" text-anchor="middle" font-size="12" fill="#333">Supabase / PostgreSQL via PostgREST (tabelas qb_*)</text>

  <!-- Redis (lateral, acoplado a Servicos) -->
  <rect x="612" y="254" width="120" height="64" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="672" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#b71c1c">Redis</text>
  <text x="672" y="299" text-anchor="middle" font-size="11" fill="#333">cache</text>
  <text x="672" y="313" text-anchor="middle" font-size="10" fill="#777">(opcional)</text>

  <!-- Setas verticais (requisicao desce) -->
  <line x1="350" y1="94" x2="350" y2="140" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="206" x2="350" y2="252" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="318" x2="350" y2="364" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="430" x2="350" y2="476" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Setas de retorno (resposta sobe) -->
  <line x1="410" y1="140" x2="410" y2="94" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="410" y1="252" x2="410" y2="206" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="410" y1="364" x2="410" y2="318" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="410" y1="476" x2="410" y2="430" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Conexao Servicos <-> Redis -->
  <line x1="580" y1="286" x2="610" y2="286" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legenda -->
  <text x="380" y="20" text-anchor="middle" font-size="11" fill="#777">requisição (desce) → · resposta (sobe) ←</text>
</svg>
